name: Deploy Bot to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 104.248.134.75
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/handshake.ai
            git pull origin main
            npm install
            npm run build
            pm2 restart handshake-bot
            pm2 save
